name: fleetgo
description: FleetGo commercial vehicle booking application
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.5+1
  shared_preferences: ^2.2.2

  # Network / Utilities
  http: ^1.2.0
  intl: ^0.19.0

  # Google Maps & Location
  google_maps_flutter: ^2.16.0
  flutter_polyline_points: ^3.1.0
  geolocator: ^10.1.0

  # Background tracking (driver)
  flutter_background_geolocation: ^5.0.5

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.3.0
  firebase_messaging: ^15.2.10

  # Payments
  razorpay_flutter: ^1.4.1

  # Realtime sockets
  socket_io_client: ^3.1.4

  # Charts / Analytics
  fl_chart: ^1.2.0

  # Media / POD
  image_picker: ^1.1.2
  signature: ^5.5.0

  # PDF / Reports
  pdf: ^3.10.7
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/