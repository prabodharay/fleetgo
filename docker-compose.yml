
version: "3.9"

services:

  api-server:
    build: ./backend/api-server
    ports:
      - "3000:3000"
    depends_on:
      - redis

  socket-server:
    build: ./backend/socket-server
    ports:
      - "3001:3001"
    depends_on:
      - redis

  queue-worker:
    build: ./backend/queue-worker
    depends_on:
      - redis

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api-server
      - socket-server
